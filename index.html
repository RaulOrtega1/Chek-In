<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Asistencia QR</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 16px;
    }
    .container {
      max-width: 560px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }
    h1 { margin-top: 0; font-size: 22px; }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      background: #1565c0;
      color: #fff;
      border: none;
      margin-top: 14px;
      cursor: pointer;
    }
    .secondary { background: #2e7d32; }
    .danger { background: #c62828; }
    .msg {
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      display: none;
      white-space: pre-line;
    }
    .ok { background: #e8f5e9; color: #1b5e20; }
    .error { background: #ffebee; color: #b71c1c; }
    .info { background: #e3f2fd; color: #0d47a1; }
    .card {
      margin-top: 16px;
      padding: 14px;
      background: #eef4ff;
      border-radius: 10px;
      display: none;
    }
    .inline-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    #reader {
      width: 100%;
      margin-top: 14px;
      display: none;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .checkbox-row input {
      width: auto;
    }
    .small {
      color: #666;
      font-size: 13px;
    }
    #ultimoMarcajeBox {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #fff8e1;
      color: #7c5b00;
      font-size: 14px;
    }
    .empleado-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .empleado-foto-box {
      width: 120px;
      flex-shrink: 0;
    }
    .empleado-foto-box img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      display: none;
    }
    .sin-foto {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      border: 1px dashed #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #888;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .empleado-datos {
      flex: 1;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Control de Asistencia QR</h1>
    <p class="small">Registro de entrada/salida</p>

    <label for="supervisorSelect">Supervisor</label>
    <select id="supervisorSelect">
      <option value="">Cargando supervisores...</option>
    </select>

    <label for="tipoMarcaje">Tipo de marcaje</label>
    <select id="tipoMarcaje">
      <option value="">Seleccione...</option>
      <option value="Entrada">Entrada</option>
      <option value="Salida">Salida</option>
    </select>

    <label for="codigoQR">Código QR</label>
    <input type="text" id="codigoQR" placeholder="Ej. QR-EMP001-A7K2">

    <div class="inline-buttons">
      <button type="button" onclick="iniciarEscaner()">Escanear QR</button>
      <button type="button" class="danger" onclick="detenerEscaner()">Detener escáner</button>
    </div>

    <div id="reader"></div>

    <button type="button" onclick="buscarEmpleado()">Buscar empleado</button>

    <div id="empleadoCard" class="card">
      <div class="empleado-layout">
        <div class="empleado-foto-box">
          <img id="fotoEmpleado" alt="Foto del empleado">
          <div id="sinFotoEmpleado" class="sin-foto">Sin foto disponible</div>
        </div>

        <div class="empleado-datos">
          <div><strong>Empleado:</strong> <span id="nombreEmpleado"></span></div>
          <div><strong>Categoría:</strong> <span id="categoriaEmpleado"></span></div>
          <div><strong>Área:</strong> <span id="areaEmpleado"></span></div>
          <div id="ultimoMarcajeBox"></div>
        </div>
      </div>
    </div>

    <label for="observaciones">Observaciones</label>
    <textarea id="observaciones" rows="3" placeholder="Opcional"></textarea>

    <div class="checkbox-row">
      <input type="checkbox" id="validacionVisual">
      <label for="validacionVisual" style="margin:0;">Confirmo validación visual del empleado</label>
    </div>

    <button type="button" class="secondary" onclick="capturarUbicacion()">Capturar ubicación</button>
    <p id="ubicacionTexto" class="small">Ubicación no capturada.</p>

    <button type="button" onclick="guardarAsistencia()">Guardar asistencia</button>

    <div id="mensaje" class="msg"></div>
  </div>

  <script>
    const API_URL = "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT";
    const STORAGE_SUPERVISOR = "supervisorSeleccionado";

    let empleadoActual = null;
    let latitud = '';
    let longitud = '';
    let html5QrCode = null;
    let scannerActivo = false;
    const readerId = "reader";

    function mostrarMensaje(texto, tipo) {
      const msg = document.getElementById('mensaje');
      msg.style.display = 'block';
      msg.className = 'msg ' + tipo;
      msg.innerText = texto;
    }

    function limpiarMensaje() {
      const msg = document.getElementById('mensaje');
      msg.style.display = 'none';
      msg.innerText = '';
    }

    function resetEmpleadoVisual() {
      empleadoActual = null;
      document.getElementById('empleadoCard').style.display = 'none';
      document.getElementById('nombreEmpleado').innerText = '';
      document.getElementById('categoriaEmpleado').innerText = '';
      document.getElementById('areaEmpleado').innerText = '';
      document.getElementById('ultimoMarcajeBox').style.display = 'none';
      document.getElementById('ultimoMarcajeBox').innerText = '';

      const foto = document.getElementById('fotoEmpleado');
      const sinFoto = document.getElementById('sinFotoEmpleado');

      foto.style.display = 'none';
      foto.src = '';
      sinFoto.style.display = 'flex';
    }

    function guardarSupervisorLocal() {
      const valor = document.getElementById('supervisorSelect').value;
      if (valor) {
        localStorage.setItem(STORAGE_SUPERVISOR, valor);
      }
    }

    function restaurarSupervisorLocal() {
      return localStorage.getItem(STORAGE_SUPERVISOR) || '';
    }

    function mostrarFotoEmpleado(urlFoto) {
      const foto = document.getElementById('fotoEmpleado');
      const sinFoto = document.getElementById('sinFotoEmpleado');

      if (urlFoto && urlFoto.trim() !== '') {
        foto.src = urlFoto;
        foto.style.display = 'block';
        sinFoto.style.display = 'none';

        foto.onerror = function() {
          foto.style.display = 'none';
          sinFoto.style.display = 'flex';
        };
      } else {
        foto.style.display = 'none';
        foto.src = '';
        sinFoto.style.display = 'flex';
      }
    }

    async function cargarSupervisores() {
      try {
        const url = `${API_URL}?action=obtenerSupervisores`;
        const res = await fetch(url);
        const data = await res.json();

        const select = document.getElementById('supervisorSelect');
        select.innerHTML = '<option value="">Seleccione supervisor...</option>';

        if (data.ok && data.supervisores.length > 0) {
          data.supervisores.forEach(sup => {
            const option = document.createElement('option');
            option.value = sup.correoLogin;
            option.textContent = `${sup.nombreSupervisor} (${sup.rol})`;
            select.appendChild(option);
          });

          const supervisorGuardado = restaurarSupervisorLocal();
          if (supervisorGuardado) {
            select.value = supervisorGuardado;
          }

        } else {
          select.innerHTML = '<option value="">No hay supervisores disponibles</option>';
        }
      } catch (error) {
        mostrarMensaje('Error al cargar supervisores: ' + error.message, 'error');
      }
    }

    async function obtenerUltimoMarcaje(codigoQR) {
      try {
        const url = `${API_URL}?action=obtenerUltimoMarcaje&codigoQR=${encodeURIComponent(codigoQR)}`;
        const res = await fetch(url);
        const data = await res.json();

        const box = document.getElementById('ultimoMarcajeBox');

        if (data.ok) {
          box.style.display = 'block';

          if (data.existeUltimo) {
            box.innerText =
              `Último marcaje: ${data.ultimoMarcaje.tipoMarcaje} | ` +
              `Fecha: ${data.ultimoMarcaje.fecha} | Hora: ${data.ultimoMarcaje.hora}`;
          } else {
            box.innerText = 'No existen marcajes previos. El primer marcaje válido debe ser Entrada.';
          }
        }
      } catch (error) {
        console.error('Error al obtener último marcaje:', error);
      }
    }

    async function buscarEmpleado() {
      limpiarMensaje();

      const codigoQR = document.getElementById('codigoQR').value.trim();

      if (!codigoQR) {
        mostrarMensaje('Ingresa o escanea el código QR.', 'error');
        return;
      }

      try {
        const url = `${API_URL}?action=buscarEmpleado&codigoQR=${encodeURIComponent(codigoQR)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.ok) {
          empleadoActual = data.empleado;
          document.getElementById('empleadoCard').style.display = 'block';
          document.getElementById('nombreEmpleado').innerText = data.empleado.nombreCompleto;
          document.getElementById('categoriaEmpleado').innerText = data.empleado.categoria;
          document.getElementById('areaEmpleado').innerText = data.empleado.area;
          mostrarFotoEmpleado(data.empleado.foto || '');
          mostrarMensaje('Empleado encontrado.', 'ok');
          await obtenerUltimoMarcaje(codigoQR);
        } else {
          resetEmpleadoVisual();
          mostrarMensaje(data.mensaje, 'error');
        }
      } catch (error) {
        mostrarMensaje('Error al buscar empleado: ' + error.message, 'error');
      }
    }

    async function iniciarEscaner() {
      limpiarMensaje();

      try {
        if (typeof Html5Qrcode === 'undefined') {
          mostrarMensaje('No cargó la librería del escáner.', 'error');
          return;
        }

        if (scannerActivo) {
          mostrarMensaje('El escáner ya está activo.', 'error');
          return;
        }

        const reader = document.getElementById(readerId);
        reader.style.display = 'block';

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          mostrarMensaje('No se detectó ninguna cámara.', 'error');
          return;
        }

        let cameraId = cameras[0].id;
        const trasera = cameras.find(c =>
          (c.label || '').toLowerCase().includes('back') ||
          (c.label || '').toLowerCase().includes('rear') ||
          (c.label || '').toLowerCase().includes('environment')
        );
        if (trasera) cameraId = trasera.id;

        html5QrCode = new Html5Qrcode(readerId);

        await html5QrCode.start(
          cameraId,
          { fps: 10, qrbox: { width: 220, height: 220 } },
          async (decodedText) => {
            document.getElementById('codigoQR').value = decodedText;
            await detenerEscaner();
            buscarEmpleado();
          },
          () => {}
        );

        scannerActivo = true;
        mostrarMensaje('Escáner iniciado. Apunta al QR.', 'ok');

      } catch (error) {
        mostrarMensaje('Error al iniciar escáner: ' + (error.message || error), 'error');
        document.getElementById(readerId).style.display = 'none';
      }
    }

    async function detenerEscaner() {
      try {
        if (html5QrCode && scannerActivo) {
          await html5QrCode.stop();
          await html5QrCode.clear();
        }
      } catch (e) {
      } finally {
        scannerActivo = false;
        html5QrCode = null;
        document.getElementById(readerId).style.display = 'none';
      }
    }

    function capturarUbicacion() {
      limpiarMensaje();

      if (!navigator.geolocation) {
        mostrarMensaje('Tu navegador no soporta geolocalización.', 'error');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          latitud = position.coords.latitude;
          longitud = position.coords.longitude;
          document.getElementById('ubicacionTexto').innerText =
            'Ubicación capturada: ' + latitud + ', ' + longitud;
          mostrarMensaje('Ubicación capturada correctamente.', 'ok');
        },
        function() {
          mostrarMensaje('No se pudo capturar ubicación.', 'error');
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    async function guardarAsistencia() {
      limpiarMensaje();

      const supervisorCorreo = document.getElementById('supervisorSelect').value;
      const tipoMarcaje = document.getElementById('tipoMarcaje').value;
      const codigoQR = document.getElementById('codigoQR').value.trim();
      const observaciones = document.getElementById('observaciones').value.trim();
      const validacionVisual = document.getElementById('validacionVisual').checked;

      if (!supervisorCorreo) {
        mostrarMensaje('Debes seleccionar un supervisor.', 'error');
        return;
      }

      if (!tipoMarcaje) {
        mostrarMensaje('Selecciona el tipo de marcaje.', 'error');
        return;
      }

      if (!codigoQR) {
        mostrarMensaje('Ingresa o escanea el código QR.', 'error');
        return;
      }

      if (!empleadoActual) {
        mostrarMensaje('Primero debes buscar y validar al empleado.', 'error');
        return;
      }

      if (!validacionVisual) {
        mostrarMensaje('Debes confirmar la validación visual.', 'error');
        return;
      }

      try {
        const payload = {
          action: 'guardarAsistencia',
          supervisorCorreo,
          tipoMarcaje,
          codigoQR,
          latitud,
          longitud,
          observaciones,
          validacionVisual
        };

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.ok) {
          mostrarMensaje(
            data.mensaje + '\n' +
            'Empleado: ' + data.registro.empleado + '\n' +
            'Hora: ' + data.registro.fechaHora,
            'ok'
          );

          document.getElementById('tipoMarcaje').value = '';
          document.getElementById('codigoQR').value = '';
          document.getElementById('observaciones').value = '';
          document.getElementById('validacionVisual').checked = false;
          document.getElementById('ubicacionTexto').innerText = 'Ubicación no capturada.';
          guardarSupervisorLocal();
          resetEmpleadoVisual();
          latitud = '';
          longitud = '';
        } else {
          mostrarMensaje(data.mensaje, 'error');
        }
      } catch (error) {
        mostrarMensaje('Error al guardar asistencia: ' + error.message, 'error');
      }
    }

    window.onload = function() {
      cargarSupervisores();
      document.getElementById('supervisorSelect').addEventListener('change', guardarSupervisorLocal);
    };
  </script>
</body>
</html>
