<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Asistencia QR</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 16px;
    }
    .container {
      max-width: 560px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }
    h1 { margin-top: 0; font-size: 22px; }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      background: #1565c0;
      color: #fff;
      border: none;
      margin-top: 14px;
      cursor: pointer;
    }
    .secondary { background: #2e7d32; }
    .danger { background: #c62828; }
    .msg {
      margin-top: 14px;
      padding: 10px;
      border-radius: 8px;
      display: none;
      white-space: pre-line;
    }
    .ok { background: #e8f5e9; color: #1b5e20; }
    .error { background: #ffebee; color: #b71c1c; }
    .card {
      margin-top: 16px;
      padding: 14px;
      background: #eef4ff;
      border-radius: 10px;
      display: none;
    }
    .inline-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    #reader {
      width: 100%;
      margin-top: 14px;
      display: none;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .checkbox-row input {
      width: auto;
    }
    .small {
      color: #666;
      font-size: 13px;
    }
    #ultimoMarcajeBox {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #fff8e1;
      color: #7c5b00;
      font-size: 14px;
    }
    .empleado-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .empleado-foto-box {
      width: 120px;
      flex-shrink: 0;
    }
    .empleado-foto-box img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      display: none;
    }
    .sin-foto {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      border: 1px dashed #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #888;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      box-sizing: border-box;
    }
    .empleado-datos {
      flex: 1;
      min-width: 220px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Control de Asistencia QR</h1>
    <p class="small">Registro de entrada, salida e incidencias</p>

    <label for="supervisorSelect">Supervisor</label>
    <select id="supervisorSelect">
      <option value="">Cargando supervisores...</option>
    </select>

    <label for="tipoMarcaje">Tipo de marcaje</label>
    <select id="tipoMarcaje">
      <option value="">Seleccione...</option>
      <option value="Entrada">Entrada</option>
      <option value="Salida">Salida</option>
      <option value="Vacaciones">Vacaciones</option>
      <option value="Falta">Falta</option>
    </select>

    <div id="bloqueQR">
      <label for="codigoQR">Código QR</label>
      <input type="text" id="codigoQR" placeholder="Ej. QR-EMP001-A7K2">

      <div class="inline-buttons">
        <button type="button" onclick="iniciarEscaner()">Escanear QR</button>
        <button type="button" class="danger" onclick="detenerEscaner()">Detener escáner</button>
      </div>

      <div id="reader"></div>

      <button type="button" onclick="buscarEmpleadoPorQR()">Buscar empleado</button>
    </div>

    <div id="bloqueEmpleadoManual" class="hidden">
      <label for="empleadoSelect">Empleado</label>
      <select id="empleadoSelect">
        <option value="">Cargando empleados...</option>
      </select>
      <button type="button" onclick="buscarEmpleadoPorSeleccion()">Cargar empleado</button>
    </div>

    <div id="empleadoCard" class="card">
      <div class="empleado-layout">
        <div class="empleado-foto-box">
          <img id="fotoEmpleado" alt="Foto del empleado">
          <div id="sinFotoEmpleado" class="sin-foto">Sin foto disponible</div>
        </div>

        <div class="empleado-datos">
          <div><strong>Empleado:</strong> <span id="nombreEmpleado"></span></div>
          <div><strong>Categoría:</strong> <span id="categoriaEmpleado"></span></div>
          <div><strong>NSS:</strong> <span id="nssEmpleado"></span></div>
          <div id="ultimoMarcajeBox"></div>
        </div>
      </div>
    </div>

    <label for="observaciones">Observaciones</label>
    <textarea id="observaciones" rows="3" placeholder="Opcional"></textarea>

    <div id="bloqueValidacionVisual" class="checkbox-row">
      <input type="checkbox" id="validacionVisual">
      <label for="validacionVisual" style="margin:0;">Confirmo validación visual del empleado</label>
    </div>

    <div id="bloqueUbicacion">
      <button type="button" class="secondary" onclick="capturarUbicacion()">Capturar ubicación</button>
      <p id="ubicacionTexto" class="small">Ubicación no capturada.</p>
    </div>

    <button type="button" onclick="guardarAsistencia()">Guardar marcaje</button>

    <div id="mensaje" class="msg"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxr9Z3cLm-4uMnXUJb5LFlJpNDl_YjcTUSNsiXd0Xex3OslekTjJMNO5P77E_7E99PlVQ/exec";
    const STORAGE_SUPERVISOR = "supervisorSeleccionado";

    let empleadoActual = null;
    let latitud = '';
    let longitud = '';
    let html5QrCode = null;
    let scannerActivo = false;
    const readerId = "reader";

    function mostrarMensaje(texto, tipo) {
      const msg = document.getElementById('mensaje');
      msg.style.display = 'block';
      msg.className = 'msg ' + tipo;
      msg.innerText = texto;
    }

    function limpiarMensaje() {
      const msg = document.getElementById('mensaje');
      msg.style.display = 'none';
      msg.innerText = '';
    }

    function resetEmpleadoVisual() {
      empleadoActual = null;
      document.getElementById('empleadoCard').style.display = 'none';
      document.getElementById('nombreEmpleado').innerText = '';
      document.getElementById('categoriaEmpleado').innerText = '';
      document.getElementById('nssEmpleado').innerText = '';
      document.getElementById('ultimoMarcajeBox').style.display = 'none';
      document.getElementById('ultimoMarcajeBox').innerText = '';

      const foto = document.getElementById('fotoEmpleado');
      const sinFoto = document.getElementById('sinFotoEmpleado');
      foto.style.display = 'none';
      foto.src = '';
      sinFoto.style.display = 'flex';
    }

    function guardarSupervisorLocal() {
      const valor = document.getElementById('supervisorSelect').value;
      if (valor) localStorage.setItem(STORAGE_SUPERVISOR, valor);
    }

    function restaurarSupervisorLocal() {
      return localStorage.getItem(STORAGE_SUPERVISOR) || '';
    }

    function mostrarFotoEmpleado(urlFoto) {
      const foto = document.getElementById('fotoEmpleado');
      const sinFoto = document.getElementById('sinFotoEmpleado');

      if (urlFoto && urlFoto.trim() !== '') {
        foto.src = urlFoto;
        foto.style.display = 'block';
        sinFoto.style.display = 'none';

        foto.onerror = function() {
          foto.style.display = 'none';
          sinFoto.style.display = 'flex';
        };
      } else {
        foto.style.display = 'none';
        foto.src = '';
        sinFoto.style.display = 'flex';
      }
    }

    function actualizarModoFormulario() {
      const tipo = document.getElementById('tipoMarcaje').value;

      const usaQR = (tipo === 'Entrada' || tipo === 'Salida');
      const esIncidencia = (tipo === 'Vacaciones' || tipo === 'Falta');

      document.getElementById('bloqueQR').style.display = usaQR ? 'block' : 'none';
      document.getElementById('bloqueEmpleadoManual').style.display = esIncidencia ? 'block' : 'none';
      document.getElementById('bloqueValidacionVisual').style.display = usaQR ? 'flex' : 'none';
      document.getElementById('bloqueUbicacion').style.display = usaQR ? 'block' : 'none';

      resetEmpleadoVisual();
      document.getElementById('codigoQR').value = '';
      document.getElementById('validacionVisual').checked = false;
      document.getElementById('ubicacionTexto').innerText = 'Ubicación no capturada.';
      latitud = '';
      longitud = '';
    }

    async function cargarSupervisores() {
      try {
        const res = await fetch(`${API_URL}?action=obtenerSupervisores`);
        const data = await res.json();

        const select = document.getElementById('supervisorSelect');
        select.innerHTML = '<option value="">Seleccione supervisor...</option>';

        if (data.ok && data.supervisores.length > 0) {
          data.supervisores.forEach(sup => {
            const option = document.createElement('option');
            option.value = sup.correoLogin;
            option.textContent = `${sup.nombreSupervisor} (${sup.rol})`;
            select.appendChild(option);
          });

          const supervisorGuardado = restaurarSupervisorLocal();
          if (supervisorGuardado) select.value = supervisorGuardado;
        } else {
          select.innerHTML = '<option value="">No hay supervisores disponibles</option>';
        }
      } catch (error) {
        mostrarMensaje('Error al cargar supervisores: ' + error.message, 'error');
      }
    }

    async function cargarEmpleados() {
      try {
        const res = await fetch(`${API_URL}?action=obtenerEmpleados`);
        const data = await res.json();

        const select = document.getElementById('empleadoSelect');
        select.innerHTML = '<option value="">Seleccione empleado...</option>';

        if (data.ok && data.empleados.length > 0) {
          data.empleados.forEach(emp => {
            const option = document.createElement('option');
            option.value = emp.idEmpleado;
            option.textContent = `${emp.nombreCompleto} - ${emp.categoria}`;
            option.dataset.qr = emp.codigoQR || '';
            option.dataset.nombre = emp.nombreCompleto || '';
            option.dataset.categoria = emp.categoria || '';
            option.dataset.nss = emp.nss || '';
            option.dataset.foto = emp.foto || '';
            select.appendChild(option);
          });
        } else {
          select.innerHTML = '<option value="">No hay empleados disponibles</option>';
        }
      } catch (error) {
        mostrarMensaje('Error al cargar empleados: ' + error.message, 'error');
      }
    }

    async function obtenerUltimoMarcajePorQR(codigoQR) {
      try {
        const res = await fetch(`${API_URL}?action=obtenerUltimoMarcaje&codigoQR=${encodeURIComponent(codigoQR)}`);
        const data = await res.json();

        const box = document.getElementById('ultimoMarcajeBox');
        if (data.ok) {
          box.style.display = 'block';

          if (data.existeUltimo) {
            box.innerText = `Último marcaje de hoy: ${data.ultimoMarcaje.tipoMarcaje} | Fecha: ${data.ultimoMarcaje.fecha} | Hora: ${data.ultimoMarcaje.hora}`;
          } else {
            box.innerText = 'No existen marcajes previos hoy.';
          }
        }
      } catch (error) {
        console.error(error);
      }
    }

    function pintarEmpleado(emp) {
      empleadoActual = emp;
      document.getElementById('empleadoCard').style.display = 'block';
      document.getElementById('nombreEmpleado').innerText = emp.nombreCompleto || '';
      document.getElementById('categoriaEmpleado').innerText = emp.categoria || '';
      document.getElementById('nssEmpleado').innerText = emp.nss || '';
      mostrarFotoEmpleado(emp.foto || '');
    }

    async function buscarEmpleadoPorQR() {
      limpiarMensaje();

      const codigoQR = document.getElementById('codigoQR').value.trim();
      if (!codigoQR) {
        mostrarMensaje('Ingresa o escanea el código QR.', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_URL}?action=buscarEmpleado&codigoQR=${encodeURIComponent(codigoQR)}`);
        const data = await res.json();

        if (data.ok) {
          pintarEmpleado(data.empleado);
          mostrarMensaje('Empleado encontrado.', 'ok');
          await obtenerUltimoMarcajePorQR(codigoQR);
        } else {
          resetEmpleadoVisual();
          mostrarMensaje(data.mensaje, 'error');
        }
      } catch (error) {
        mostrarMensaje('Error al buscar empleado: ' + error.message, 'error');
      }
    }

    async function buscarEmpleadoPorSeleccion() {
      limpiarMensaje();

      const select = document.getElementById('empleadoSelect');
      const selectedOption = select.options[select.selectedIndex];

      if (!select.value) {
        mostrarMensaje('Selecciona un empleado.', 'error');
        return;
      }

      const emp = {
        idEmpleado: select.value,
        codigoQR: selectedOption.dataset.qr || '',
        nombreCompleto: selectedOption.dataset.nombre || '',
        categoria: selectedOption.dataset.categoria || '',
        nss: selectedOption.dataset.nss || '',
        foto: selectedOption.dataset.foto || ''
      };

      pintarEmpleado(emp);

      if (emp.codigoQR) {
        await obtenerUltimoMarcajePorQR(emp.codigoQR);
      }

      mostrarMensaje('Empleado cargado.', 'ok');
    }

    async function iniciarEscaner() {
      limpiarMensaje();

      try {
        if (typeof Html5Qrcode === 'undefined') {
          mostrarMensaje('No cargó la librería del escáner.', 'error');
          return;
        }

        if (scannerActivo) {
          mostrarMensaje('El escáner ya está activo.', 'error');
          return;
        }

        const reader = document.getElementById(readerId);
        reader.style.display = 'block';

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          mostrarMensaje('No se detectó ninguna cámara.', 'error');
          return;
        }

        let cameraId = cameras[0].id;
        const trasera = cameras.find(c =>
          (c.label || '').toLowerCase().includes('back') ||
          (c.label || '').toLowerCase().includes('rear') ||
          (c.label || '').toLowerCase().includes('environment')
        );
        if (trasera) cameraId = trasera.id;

        html5QrCode = new Html5Qrcode(readerId);

        await html5QrCode.start(
          cameraId,
          { fps: 10, qrbox: { width: 220, height: 220 } },
          async (decodedText) => {
            document.getElementById('codigoQR').value = decodedText;
            await detenerEscaner();
            buscarEmpleadoPorQR();
          },
          () => {}
        );

        scannerActivo = true;
        mostrarMensaje('Escáner iniciado. Apunta al QR.', 'ok');
      } catch (error) {
        mostrarMensaje('Error al iniciar escáner: ' + (error.message || error), 'error');
        document.getElementById(readerId).style.display = 'none';
      }
    }

    async function detenerEscaner() {
      try {
        if (html5QrCode && scannerActivo) {
          await html5QrCode.stop();
          await html5QrCode.clear();
        }
      } catch (e) {
      } finally {
        scannerActivo = false;
        html5QrCode = null;
        document.getElementById(readerId).style.display = 'none';
      }
    }

    function capturarUbicacion() {
      limpiarMensaje();

      if (!navigator.geolocation) {
        mostrarMensaje('Tu navegador no soporta geolocalización.', 'error');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          latitud = position.coords.latitude;
          longitud = position.coords.longitude;
          document.getElementById('ubicacionTexto').innerText = `Ubicación capturada: ${latitud}, ${longitud}`;
          mostrarMensaje('Ubicación capturada correctamente.', 'ok');
        },
        function() {
          mostrarMensaje('No se pudo capturar ubicación.', 'error');
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    async function guardarAsistencia() {
      limpiarMensaje();

      const supervisorCorreo = document.getElementById('supervisorSelect').value;
      const tipoMarcaje = document.getElementById('tipoMarcaje').value;
      const observaciones = document.getElementById('observaciones').value.trim();

      if (!supervisorCorreo) {
        mostrarMensaje('Debes seleccionar un supervisor.', 'error');
        return;
      }

      if (!tipoMarcaje) {
        mostrarMensaje('Selecciona el tipo de marcaje.', 'error');
        return;
      }

      if (!empleadoActual) {
        mostrarMensaje('Debes cargar un empleado antes de guardar.', 'error');
        return;
      }

      const payload = {
        action: 'guardarAsistencia',
        supervisorCorreo,
        tipoMarcaje,
        codigoQR: empleadoActual.codigoQR || '',
        idEmpleado: empleadoActual.idEmpleado || '',
        latitud,
        longitud,
        observaciones,
        validacionVisual: document.getElementById('validacionVisual').checked
      };

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.ok) {
          mostrarMensaje(
            `${data.mensaje}\nEmpleado: ${data.registro.empleado}\nHora: ${data.registro.fechaHora}`,
            'ok'
          );

          guardarSupervisorLocal();
          document.getElementById('tipoMarcaje').value = '';
          document.getElementById('codigoQR').value = '';
          document.getElementById('empleadoSelect').value = '';
          document.getElementById('observaciones').value = '';
          document.getElementById('validacionVisual').checked = false;
          document.getElementById('ubicacionTexto').innerText = 'Ubicación no capturada.';
          latitud = '';
          longitud = '';
          resetEmpleadoVisual();
          actualizarModoFormulario();
        } else {
          mostrarMensaje(data.mensaje, 'error');
        }
      } catch (error) {
        mostrarMensaje('Error al guardar marcaje: ' + error.message, 'error');
      }
    }

    window.onload = function() {
      cargarSupervisores();
      cargarEmpleados();
      actualizarModoFormulario();

      document.getElementById('supervisorSelect').addEventListener('change', guardarSupervisorLocal);
      document.getElementById('tipoMarcaje').addEventListener('change', actualizarModoFormulario);
    };
  </script>
</body>
</html>
